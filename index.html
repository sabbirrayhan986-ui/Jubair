<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jubair ❤️ Anisha</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#100010,#ff4d6d);
    color:white;
    height:100vh;
}

.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
    margin:10px;
}

#enterBtn,#yesBtn,#finish{
    background:#ff4d6d;
    color:white;
}

#noBtn{
    position:absolute;
    background:red;
    color:white;
}

.hidden{
    display:none;
}

.glow{
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff4d6d,
        0 0 40px #ff4d6d;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

.firework{
    position:absolute;
    font-size:40px;
    animation:explode 2s linear forwards;
}

@keyframes explode{
    0%{
        transform:scale(0);
        opacity:1;
    }
    100%{
        transform:scale(3);
        opacity:0;
    }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="welcome" class="page">
    <h1>Hello Anisha ❤️</h1>
    <h2>This is something special from Jubair</h2>
    <br>
    <button id="enterBtn">Enter ❤️</button>
</div>

<div id="proposal" class="page hidden">
    <h1>I Love You Anisha ❤️</h1>
    <h2>Do You Love Me?</h2>
    <br>
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<div id="thanks" class="page hidden">
    <h1 class="glow">
        ❤️ Thank You For Accepting My Love ❤️
    </h1>
</div>

<div id="datePage" class="page hidden">
    <h1>When will you go on a date with me?</h1>

    <br>

    <input type="date">

    <br><br>

    <select>
        <option>Coffee Date ☕</option>
        <option>Movie Date 🎬</option>
        <option>Dinner Date 🍽️</option>
        <option>Long Drive 🚗</option>
    </select>

    <br><br>

    <button id="finish">Done ❤️</button>
</div>

<div id="final" class="page hidden">
    <h1 class="glow">
        I can't wait to spend this special day with you Anisha ❤️
    </h1>

    <br>

    <h2>
        Forever Yours,<br>
        Jubair ❤️
    </h2>
</div>

<script>

const music = document.getElementById("music");

const welcome = document.getElementById("welcome");
const proposal = document.getElementById("proposal");
const thanks = document.getElementById("thanks");
const datePage = document.getElementById("datePage");
const finalPage = document.getElementById("final");

const enterBtn = document.getElementById("enterBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

enterBtn.onclick = () => {
    music.play();
    welcome.classList.add("hidden");
    proposal.classList.remove("hidden");
};

document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const dx = e.clientX - (rect.left + rect.width/2);
    const dy = e.clientY - (rect.top + rect.height/2);

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 150){
        noBtn.style.left =
            Math.random() *
            (window.innerWidth - 100) + "px";

        noBtn.style.top =
            Math.random() *
            (window.innerHeight - 50) + "px";
    }
});

yesBtn.onclick = () => {

    proposal.classList.add("hidden");
    thanks.classList.remove("hidden");

    const interval = setInterval(firework,200);

    setTimeout(() => {
        clearInterval(interval);

        thanks.classList.add("hidden");
        datePage.classList.remove("hidden");
    },4000);
};

document.getElementById("finish").onclick = () => {
    datePage.classList.add("hidden");
    finalPage.classList.remove("hidden");
};

function createHeart(){
    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random() * window.innerWidth + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    },6000);
}

function firework(){

    const f = document.createElement("div");

    f.className = "firework";
    f.innerHTML = "🎆";

    f.style.left =
        Math.random() * window.innerWidth + "px";

    f.style.top =
        Math.random() * window.innerHeight + "px";

    document.body.appendChild(f);

    setTimeout(() => {
        f.remove();
    },2000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
